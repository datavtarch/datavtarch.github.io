<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTARCH Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 60px 40px;
            text-align: center;
        }
        
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 50px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }
        
        .subtitle {
            color: #667eea;
            margin-bottom: 30px;
            font-size: 16px;
        }
        
        .bio {
            color: #666;
            line-height: 1.6;
            margin-bottom: 40px;
            font-size: 14px;
        }
        
        .links {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .link-btn {
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 2px solid #667eea;
            color: #667eea;
            display: inline-block;
        }
        
        .link-btn:hover {
            background: #667eea;
            color: white;
        }
        
        .link-btn.primary {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .link-btn.primary:hover {
            background: #764ba2;
            border-color: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-pic">👨‍💻</div>
        <h1>VTARCH</h1>
        <p class="subtitle">Developer & Creator</p>
        <p class="bio">
            Welcome to my profile! I'm passionate about creating amazing web experiences and building innovative solutions.
        </p>
        <div class="links">
            <a href="https://github.com/datavtarch" class="link-btn primary">GitHub</a>
            <a href="mailto:contact@example.com" class="link-btn">Email</a>
            <a href="https://twitter.com" class="link-btn">Twitter</a>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
